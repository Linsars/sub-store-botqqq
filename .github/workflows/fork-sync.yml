name: Sync Upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync upstream files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM="Linsars/sub-store-bot"
          mkdir -p workers

          for f in worker.mjs proxy-utils.esm.js; do
            curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$UPSTREAM/contents/$f" \
              | jq -r ".content" | base64 -d > "workers/$f"
            echo "done $f"
          done

          if git diff --quiet workers/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workers/
          git commit -m "chore: sync upstream"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Deploy to CF
        if: always()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME || github.event.repository.name }}
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F 'metadata={"main_module":"worker.mjs","keep_bindings":["kv_namespace","plain_text","secret_text","service"]};type=application/json' \
            -F "worker.mjs=@workers/worker.mjs;type=application/javascript+module" \
            -F "proxy-utils.esm.js=@workers/proxy-utils.esm.js;type=application/javascript+module" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/$CF_WORKER_NAME"
          echo "done deploy"
